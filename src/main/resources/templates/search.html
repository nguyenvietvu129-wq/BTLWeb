<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Linh Kiện - Tìm kiếm sản phẩm</title>
    <link rel="stylesheet" href="/css/search.css">
</head>
<body>
<div class="header">
    <div class="container">
        <div class="header-content">
            <div class="logo">
                <a href="/"><h1>Kho Linh Kiện</h1></a>
            </div>
            <div class="nav-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm..." th:value="${keyword}">
                    <button id="searchBtn">🔍 Tìm kiếm</button>
                </div>
                <button class="btn-filter" id="filterBtn">📋 Bộ lọc</button>
                <button class="btn-clear" id="clearFilterBtn">🗑️ Xóa lọc</button>
                <div class="nav-buttons">
                    <button id="cart-btn">🛒 Giỏ hàng</button>
                    <button id="login-btn">Đăng nhập</button>
                    <button id="logout-btn" style="display:none;">Đăng xuất</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="main-content">
        <div class="sidebar" id="sidebar">
            <div class="filter-section">
                <h3>Thể loại</h3>
                <div id="category-list"></div>
            </div>

            <div class="filter-section">
                <h3>Khoảng giá</h3>
                <label class="filter-option">
                    <input type="radio" name="price" value=""> Tất cả
                </label>
                <label class="filter-option">
                    <input type="radio" name="price" value="0-100000"> Dưới 100.000đ
                </label>
                <label class="filter-option">
                    <input type="radio" name="price" value="100000-300000"> 100.000đ - 300.000đ
                </label>
                <label class="filter-option">
                    <input type="radio" name="price" value="300000-500000"> 300.000đ - 500.000đ
                </label>
                <label class="filter-option">
                    <input type="radio" name="price" value="500000-1000000"> 500.000đ - 1.000.000đ
                </label>
                <label class="filter-option">
                    <input type="radio" name="price" value="1000000-999999999"> Trên 1.000.000đ
                </label>
            </div>
        </div>

        <div class="products-section">
            <div class="search-title">
                <h2 id="search-result-title">
                        <span th:if="${keyword != null and keyword != ''}">
                            Kết quả tìm kiếm cho từ khóa: "<strong th:text="${keyword}"></strong>"
                        </span>
                    <span th:if="${categoryId != null and categoryId != ''}">
                            Sản phẩm theo danh mục
                        </span>
                    <span th:if="${(keyword == null or keyword == '') and (categoryId == null or categoryId == '')}">
                            Tất cả sản phẩm
                        </span>
                    <span th:if="${totalElements > 0}">
                            (<span th:text="${totalElements}"></span> sản phẩm)
                        </span>
                </h2>
            </div>

            <div class="sort-bar">
                <div>Sắp xếp theo:</div>
                <select id="sort-select" class="sort-select">
                    <option value="id,desc" th:selected="${sort == 'id,desc'}">Mới nhất</option>
                    <option value="price,asc" th:selected="${sort == 'price,asc'}">Giá tăng dần</option>
                    <option value="price,desc" th:selected="${sort == 'price,desc'}">Giá giảm dần</option>
                    <option value="name,asc" th:selected="${sort == 'name,asc'}">Tên A-Z</option>
                    <option value="name,desc" th:selected="${sort == 'name,desc'}">Tên Z-A</option>
                </select>
            </div>

            <div id="products-grid" class="products-grid">
                <div th:if="${products != null and products.size() > 0}" th:each="product : ${products}" class="product-card" th:data-id="${product.id}" th:onclick="'goToProductDetail(' + ${product.id} + ')'">
                    <div class="product-image-wrapper">
                            <span class="stock-badge" th:classappend="${product.quantity > 0 ? 'in-stock' : 'out-stock'}">
                                <span th:if="${product.quantity > 0}">Còn hàng</span>
                                <span th:if="${product.quantity <= 0}">Hết hàng</span>
                            </span>
                        <img th:src="${product.image != null ? product.image : '/images/default-product.png'}"
                             th:alt="${product.name}"
                             class="product-image"
                             onerror="this.src='/images/default-product.png'">
                    </div>
                    <div class="product-info">
                        <div class="product-name" th:text="${product.name}"></div>
                        <div class="product-price" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + ' VND'"></div>
                    </div>
                </div>
                <div th:if="${products == null or products.size() == 0}" class="no-results">
                    Không tìm thấy sản phẩm phù hợp
                </div>
            </div>

            <div id="pagination" class="pagination">
                <div th:if="${totalPages > 1}" class="pagination-controls">
                    <button th:if="${currentPage > 0}" class="page-btn" th:data-page="${currentPage - 1}">« Trước</button>
                    <button th:if="${currentPage <= 0}" class="page-btn disabled" disabled>« Trước</button>

                    <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                        <button th:if="${i == currentPage}" class="page-btn active" th:data-page="${i}" th:text="${i + 1}" disabled></button>
                        <button th:if="${i != currentPage}" class="page-btn" th:data-page="${i}" th:text="${i + 1}"></button>
                    </th:block>

                    <button th:if="${currentPage < totalPages - 1}" class="page-btn" th:data-page="${currentPage + 1}">Sau »</button>
                    <button th:if="${currentPage >= totalPages - 1}" class="page-btn disabled" disabled>Sau »</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/search.js"></script>

<script>
    // Truyền dữ liệu từ server sang JavaScript
    var serverData = {
        keyword: /*[[${keyword}]]*/ '',
        categoryId: /*[[${categoryId}]]*/ '',
        minPrice: /*[[${minPrice}]]*/ null,
        maxPrice: /*[[${maxPrice}]]*/ null,
        sort: /*[[${sort}]]*/ 'id,desc',
        currentPage: /*[[${currentPage}]]*/ 0,
        totalPages: /*[[${totalPages}]]*/ 0
    };

    function goToProductDetail(productId) {
        window.location.href = '/product/' + productId;
    }
</script>
</body>
</html>
